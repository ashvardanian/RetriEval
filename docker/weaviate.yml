services:
  weaviate:
    # Weaviate 1.37.x — HNSW with bq / sq / pq / rq quantization configs.
    # We wire BQ only in the first pass (deterministic sign-based).
    image: semitechnologies/weaviate:1.36.10
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      DEFAULT_VECTORIZER_MODULE: "none"
      CLUSTER_HOSTNAME: "node1"
    volumes:
      - weaviate_data:/var/lib/weaviate

volumes:
  weaviate_data:
