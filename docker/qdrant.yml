services:
  qdrant:
    # Qdrant v1.17.x — exposes Datatype::{Float32,Float16,Uint8} and
    # quantization_config.binary / scalar / product (we only use BQ and SQ).
    image: qdrant/qdrant:v1.17.1
    ports:
      - "6333:6333"
      - "6334:6334"
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  qdrant_data:
